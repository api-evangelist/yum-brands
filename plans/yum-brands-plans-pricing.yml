description: |
  Yum! Brands (KFC, Pizza Hut, Taco Bell, Habit Burger) does not operate a public
  developer API or price card. Any third-party data access is gated through
  brand-level franchise / supplier / partnership agreements rather than a self-serve
  developer portal.
sources:
  - https://www.yum.com/
notes: |
  No yum.com pricing or developer documentation is reachable; the corporate site is
  partnership-oriented. Treated as no-public-API contact-sales scaffold.
plans:
  - id: yum-brands-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Yum! Brands data / integration access is negotiated through
      franchise, supplier, or marketing partnership agreements per brand.
    entries:
      - label: Custom Commercial Terms
        name: custom
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Brand-level partnership review (KFC / Pizza Hut / Taco Bell / Habit Burger)
      - name: Franchise / supplier integration enablement
