description: >-
  Yum! Brands is one of the world's largest restaurant companies, with global
  brands including KFC, Pizza Hut, Taco Bell, and The Habit Burger Grill.
  The company operates the Byte by Yum! AI-driven technology platform that
  powers digital ordering, loyalty programs, point-of-sale, kitchen operations,
  inventory management, and team member tools across over 63,000 restaurants
  in 155 countries.
