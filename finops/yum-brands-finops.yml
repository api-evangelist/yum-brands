description: |
  Yum! Brands does not operate a metered API; this artifact is a Contact Sales
  placeholder rather than a billable cost surface.
sources:
  - https://www.yum.com/
notes: |
  No public API or invoice line-item documentation exists for Yum! Brands. Any
  partner-side spend (royalties, supplier fees, advertising co-op contributions)
  flows through brand-level franchise / supplier contracts, not a developer billing
  surface.
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Yum! Brands
  ServiceCategory: Quick Service Restaurants
  ProviderName: Yum! Brands
  PublisherName: Yum! Brands, Inc.
  InvoiceIssuerName: Yum! Brands, Inc.
  BillingCurrency: USD
meters:
  - name: partnership_agreements
    description: Negotiated brand / franchise / supplier agreement line items; not a
      metered API meter.
    unit: varies
    aggregation: count
principles:
  - name: Visibility
    description: Spend visibility flows through the partner's own AP / contract management
      system; Yum! Brands does not expose a usage API.
  - name: Allocation
    description: Allocate by brand (KFC / Pizza Hut / Taco Bell / Habit Burger) and by
      contract type (franchise royalty, supplier, marketing co-op).
  - name: Optimization
    description: Optimization happens at contract renewal (volume tiers, exclusivity, term
      length) rather than via runtime levers.
  - name: Accountability
    description: Spend ownership sits with the franchisee / supplier finance lead who is
      counterparty to the Yum! Brands agreement.
